name: K6 Performance Tests (TypeScript)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [local, staging, prod]
  schedule:
    - cron: '0 4 * * *' # nightly

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run typecheck

  auth-flow-test:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Run auth flow load test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/auth-load-test.ts
          flags: -e ENV=${{ github.event.inputs.environment || 'staging' }} --summary-export=reports/auth-summary.json

      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-flow-summary
          path: reports/auth-summary.json

  homepage-load-test:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Run homepage load test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/homepage-load-test.ts
          flags: -e ENV=${{ github.event.inputs.environment || 'staging' }} --summary-export=reports/homepage-summary.json

      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: homepage-summary
          path: reports/homepage-summary.json
